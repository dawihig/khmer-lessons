   {n:17,title:"Health & pharmacy",sections:[
    {t:"l",d:"8 min",h:"Health basics",b:"Essential survival phrases. Learn these well.",p:[["ខ្ញុំឈឺ","Khnhom chhoeu","I am sick / in pain"],["ឈឺក្បាល / ឈឺពោះ","Chhoeu kbal / Chhoeu poah","Headache / Stomachache"],["ខ្ញុំត្រូវការថ្នាំ","Khnhom trov kar thnam","I need medicine"],["ហៅពេទ្យ","Hav pet","Call a doctor"]]},
    {t:"s",d:"12 min",h:"Pharmacy role-play",b:"Role-play visiting a pharmacy. Describe your symptoms, ask for medicine, ask about dosage. Play both sides of the full conversation."},
    {t:"r",d:"10 min",h:"Week 3 speed drill",b:"Cover the Khmer column of all Week 3 phrases. Say each from the English prompt. Aim for zero pauses. Anything you hesitate on — drill it 10 more times."}
   ],challenge:{lv:"Level 5",h:"Pharmacy visit",b:"Visit a pharmacy. Ask for something in Khmer: ខ្ញុំត្រូវការថ្នាំឈឺក្បាល (Khnhom trov kar thnam chhoeu kbal = I need headache medicine). Speak first — show text only if completely stuck."}},
   {n:18,title:"Family vocabulary",sections:[
    {t:"l",d:"8 min",h:"Family words",b:"Khmer has specific terms for older vs younger siblings — different words entirely.",p:[["ម្តាយ / ឪពុក","Mdai / Oupuk","Mother / Father"],["បងប្រុស / បងស្រី","Bong bros / Bong srei","Older brother / Older sister"],["ប្អូនប្រុស / ប្អូនស្រី","Baaun bros / Baaun srei","Younger brother / Younger sister"],["ប្តី / ប្រពន្ធ / កូន","Pdei / Propoan / Koun","Husband / Wife / Child"]]},
    {t:"s",d:"12 min",h:"Describe your family",b:"Talk about your family entirely in Khmer. How many members, who they are, where they live.\n'ខ្ញុំមានកូន ពីរនាក់' (Khnhom mean koun pi neak = I have two children)."},
    {t:"a",d:"8 min",h:"Anthem — line 4",b:"Add line 4. Practise lines 1–4. Focus on the 4th line's melody — it has a distinctive curve. Sing all 4 lines twice with the recording."}
   ],challenge:{lv:"Level 5",h:"Family call in Khmer",b:"Call a family member. Open the conversation ONLY in Khmer — greet them, ask how they are, say something about your day. Hold out for at least 3 exchanges before switching to English."}},
   {n:19,title:"Feelings & recovery phrases",sections:[
    {t:"l",d:"8 min",h:"Emotion vocabulary",b:"Listen and connect each word to a real memory of feeling that emotion.",p:[["រីករាយ / ទុក្ខ / ខ្លាច","Rikreay / Tukh / Khleach","Happy / Sad / Afraid"],["ក្តៅគំនុំ / ភ្ញាក់ផ្អើល","Kdav komnorm / Phnheak phaoel","Angry / Surprised"],["ខ្ញុំមិនយល់","Khnhom min yol","I don't understand"],["សូមនិយាយម្ដងទៀត","Som niyeay mdong tiet","Please say that again"]]},
    {t:"s",d:"12 min",h:"Recovery phrase drill",b:"The last two phrases above are your most important tools. Practise them until they come out automatically — before you even think. Then describe how you feel right now and why, using emotion words."},
    {t:"r",d:"10 min",h:"Hard phrase drill",b:"Write out (romanized) the 3 phrases you find hardest to say. Drill each one 20 times aloud. Test yourself without looking."}
   ],challenge:{lv:"Level 5",h:"Name your emotions",b:"Each time something makes you feel something today, say that emotion out loud in Khmer immediately. Aim to use at least 5 different emotion words throughout the day."}},
   {n:20,title:"Week 3 review",sections:[
    {t:"r",d:"15 min",h:"Market run",b:"Without notes, do a full mock shopping trip out loud: enter market → greet the seller → ask for 3 items → negotiate one price → pay → say goodbye. Record it."},
    {t:"l",d:"8 min",h:"Market scene comprehension",b:"Watch a Khmer market scene on YouTube. How many words do you recognise? By end of Week 3 you should catch at least 15–20 words per minute."},
    {t:"a",d:"7 min",h:"Anthem checkpoint — 4 lines",b:"Perform lines 1–4 from memory, with correct melody. Record yourself. You are more than halfway through the first verse. Keep building."}
   ],challenge:{lv:"Level 6",h:"30-minute Khmer-only shopping",b:"Spend 30 minutes in a market (or simulated online shopping). Every item: describe it in Khmer — colour, size, price, whether you want it. Zero English for the full 30 minutes."}}
  ]},
  {n:4,title:"Week 4 — Social Khmer",theme:"Opinions, small talk & friendship",days:[
   {n:22,title:"Opinions & preferences",sections:[
    {t:"l",d:"8 min",h:"Expressing opinions",b:"These structures unlock hundreds of conversations. Learn the pattern, not just the words.",p:[["ខ្ញុំចូលចិត្ត ___","Khnhom chouléchét ___","I like ___"],["ខ្ញុំមិនចូលចិត្ត ___","Khnhom min chouléchét ___","I don't like ___"],["ខ្ញុំគិតថា...","Khnhom kit tha...","I think that..."],["ពិតជា! / មែនទែន?","Pit chea! / Men taen?","Really! / Is that so?"]]},
    {t:"s",d:"12 min",h:"Give your opinions",b:"Give your opinion on 5 topics: food, weather, a film, a sport, a place. Full sentences using 'ខ្ញុំគិតថា...' structures. No single-word answers."},
    {t:"a",d:"8 min",h:"Anthem — line 5",b:"Add line 5. Try singing without the recording for the first time. Check yourself at the end. Note your weakest line — focus there."}
   ],challenge:{lv:"Level 6",h:"Language exchange chat",b:"Join HelloTalk and have a 5-minute text chat in Khmer about your favourite food or a recent experience. No Google Translate during the chat — use what you know and work around gaps."}},
   {n:23,title:"Weather & small talk",sections:[
    {t:"l",d:"8 min",h:"Weather vocabulary",b:"Weather is the universal conversation-starter. Master this and you can open any interaction.",p:[["ក្តៅ / រងា / ភ្លៀង","Kdav / Rungea / Phlieng","Hot / Cold / Rain"],["ថ្ងៃសណ្ដោច / ខ្យល់","Tngai sandaoch / Khyal","Sunny / Windy"],["ថ្ងៃនេះ អាកាសធាតុ យ៉ាងម៉េច?","Tngai nih akastheat yang metch?","How's the weather today?"]]},
    {t:"s",d:"12 min",h:"Weather small talk",b:"Practise weather-based small talk for 3 scenarios: (1) meeting someone at a bus stop, (2) talking to a shopkeeper, (3) calling a friend. Each should start with weather and flow naturally into asking how they are."},
    {t:"r",d:"10 min",h:"Speed drill",b:"Can you say all weather phrases in under 20 seconds? Time yourself. Do it 3 times, getting faster each round."}
   ],challenge:{lv:"Level 6",h:"Comment on the weather",b:"Say something about the weather to 3 different people today — in Khmer if possible, or speak it to yourself the moment you notice the weather. 'ថ្ងៃនេះ ក្តៅណាស់!' (Today is very hot!)"}},
   {n:24,title:"Tense markers",sections:[
    {t:"l",d:"8 min",h:"How Khmer tense works",b:"Khmer verbs don't change form. Tense is marked by particles and time words — simpler than English!",p:[["បាន + verb","Ban + verb","Did / Have done (past)"],["កំពុង + verb","Kompung + verb","Currently doing (present)"],["នឹង + verb","Noeng + verb","Will / Going to (future)"],["រួចហើយ / មិនទាន់","Ruoch haoy / Min toan","Already done / Not yet"]]},
    {t:"s",d:"12 min",h:"5 tenses, one verb",b:"Use ញ៉ាំ (eat) with all 5 markers:\n• ខ្ញុំបានញ៉ាំ — I ate\n• ខ្ញុំកំពុងញ៉ាំ — I am eating\n• ខ្ញុំនឹងញ៉ាំ — I will eat\n• ខ្ញុំញ៉ាំរួចហើយ — I already ate\n• ខ្ញុំមិនទាន់ញ៉ាំ — I haven't eaten yet\n\nThen repeat with 3 other verbs."},
    {t:"a",d:"8 min",h:"Anthem — line 6 & full verse",b:"Add line 6. Now try the complete first verse at tempo. The melody should feel like one flowing phrase, not 6 separate lines."}
   ],challenge:{lv:"Level 7",h:"Narrate your day as it happens",b:"Use all 5 tense markers before the day is over. Record an evening summary in Khmer: 'ថ្ងៃនេះ ខ្ញុំបាន...' (Today I...) using past, present, and future."}},
   {n:25,title:"Work & hobbies",sections:[
    {t:"l",d:"8 min",h:"Work & leisure vocabulary",b:"These words let you talk about your real life — which makes them stick.",p:[["ខ្ញុំធ្វើការជា ___","Khnhom thveu kar chea ___","I work as a ___"],["ពេលទំនេរ / លំហែ","Pel tomnei / Lomhae","Free time / Relax"],["ហាត់ប្រាណ / ធ្វើដំណើរ","Hat bran / Thveu damnae","Exercise / Travel"]]},
    {t:"s",d:"12 min",h:"2-minute self-talk",b:"Give a 2-minute talk in Khmer about yourself: your job, hobbies, what you did last weekend, what you plan to do next week. It should feel like a natural conversation, not a recited list. Record it."},
    {t:"r",d:"10 min",h:"Recording review",b:"Listen back to your 2-minute recording. Note 3 specific things to improve. Write them down. Address all 3 in tomorrow's warm-up."}
   ],challenge:{lv:"Level 7",h:"10-minute voice conversation",b:"Have a 10-minute voice or video conversation via HelloTalk or Tandem. Topic: your job and hobbies. If you get stuck, describe what you mean in simpler Khmer — don't switch to English."}},
   {n:26,title:"Compliments & polite phrases",sections:[
    {t:"l",d:"8 min",h:"Social armour",b:"These phrases protect you and build rapport. The last two are critical — memorise them before your next Khmer conversation.",p:[["អ្នកនិយាយខ្មែរបានល្អ!","Neak niyeay Khmer ban laa!","You speak Khmer well!"],["ខ្ញុំនៅរៀន","Khnhom nov rien","I'm still learning"],["ខ្ញុំព្យាយាម","Khnhom pyeyam","I am trying"],["ជូនពរ!","Choun por!","Congratulations!"]]},
    {t:"s",d:"12 min",h:"Compliment exchange drill",b:"Practise the full exchange 10 times until it's automatic:\n— 'អ្នកនិយាយខ្មែរបានល្អ!'\n— 'អរគុណ! ខ្ញុំនៅរៀន ខ្ញុំព្យាយាម'\n\nWhen Khmer speakers compliment you — and they will — this is your reply."},
    {t:"a",d:"8 min",h:"Full first verse",b:"Sing the complete first verse of Nokor Reach from memory. Aim for fluency, not perfection. Record yourself. This is your Week 4 anthem checkpoint."}
   ],challenge:{lv:"Level 7",h:"Khmer cultural conversation",b:"Find a Khmer community, restaurant, or cultural event. Speak to someone in Khmer for at least 5 minutes. When they compliment your Khmer, reply: ខ្ញុំនៅរៀន ខ្ញុំព្យាយាម."}},
   {n:27,title:"Week 4 review",sections:[
    {t:"r",d:"15 min",h:"Social conversation drill",b:"Without notes, full mock social conversation:\nMeet someone → introduce yourself → weather → work → hobbies → give a compliment → say goodbye. Aim for 3 full minutes of natural speech. Record it."},
    {t:"l",d:"8 min",h:"Drama comprehension",b:"Watch a Khmer soap opera or drama clip (5–10 min). Write down every phrase you understand. By Week 4 you should be catching 20+ phrases per clip."},
    {t:"a",d:"7 min",h:"First verse performance",b:"Sing the full first verse with confidence. You should now be singing — not reciting. Feel the melody carry you."}
   ],challenge:{lv:"Level 8",h:"One-hour immersion",b:"One full hour of Khmer: change your phone language to Khmer, watch a Khmer show, think in Khmer, narrate everything you do. Full hour. No English safety net."}}
  ]},
  {n:5,title:"Week 5 — Practical life",theme:"Restaurants, banks & hotels",days:[
   {n:29,title:"Advanced restaurant Khmer",sections:[
    {t:"l",d:"8 min",h:"Advanced restaurant vocabulary",b:"Beyond ordering — you can now navigate the full dining experience.",p:[["តុសម្រាប់ ___ នាក់","Tok samrap ___ neak","Table for ___ people"],["ខ្ញុំស្ម័គ្រ...","Khnhom smak...","I would like to order..."],["គ្រឿងផ្សំ","Kroeung phasom","Ingredients"],["ផ្អែម / ជូរ / ប្រៃ / ហាល","Phaaem / Chouv / Brey / Haal","Sweet / Sour / Salty / Spicy"]]},
    {t:"s",d:"12 min",h:"Full restaurant scene",b:"Role-play the complete dining experience: arrive → request a table → order 3 courses → ask about ingredients → comment on the food → ask for the bill → leave. Full scene, both sides."},
    {t:"a",d:"8 min",h:"Anthem — second verse begins",b:"Listen to the second verse of Nokor Reach 3 times. Repeat it line by line. Don't push to memorise yet — just get the sounds and melody into your ear."}
   ],challenge:{lv:"Level 8",h:"Full restaurant in Khmer",b:"Book a table in Khmer. Order the entire meal in Khmer. Describe the taste of each dish in Khmer. Pay and leave in Khmer. Zero English all evening."}},
   {n:30,title:"Banks & post offices",sections:[
    {t:"l",d:"8 min",h:"Banking & postal vocabulary",b:"These phrases feel formal but are used every day.",p:[["ខ្ញុំចង់ដាក់ / ដកលុយ","Khnhom jong dak / dak luy","Deposit / Withdraw"],["ទូរទាត់","Turateat","Transfer money"],["អត្រាប្ដូរប្រាក់","Atra bdav brak","Exchange rate"],["លិខិត / កញ្ចប់","Likhit / Kanchop","Letter / Package"],["ត្រូវការប៉ុន្មានថ្ងៃ?","Trov kar ponman tngai?","How many days does it take?"]]},
    {t:"s",d:"12 min",h:"Bank & post office role-play",b:"Role-play two full transactions: (1) withdrawing money from a bank; (2) sending a package at the post office. Greeting to goodbye for both."},
    {t:"r",d:"10 min",h:"5-week vocabulary test",b:"Cover the Khmer column across all 5 weeks. Say each phrase from the English. Score yourself. Any phrase below 80% goes on your daily drill list."}
   ],challenge:{lv:"Level 8",h:"Real transaction in Khmer",b:"Visit a bank or post office. Complete one transaction entirely in Khmer. Try to understand any forms in Khmer first before asking for help in English."}},
   {n:33,title:"Handling misunderstandings",sections:[
    {t:"l",d:"8 min",h:"Recovery phrases",b:"Among the most useful phrases in any language. Know them cold.",p:[["ខ្ញុំមិនយល់","Khnhom min yol","I don't understand"],["សូមនិយាយយឺត","Som niyeay yeut","Please speak slowly"],["អាចសរសេរជូនខ្ញុំ?","Ach sarsaer choun khnhom?","Can you write it for me?"],["ន័យថា អ្វី?","Neay tha avei?","What does that mean?"]]},
    {t:"s",d:"14 min",h:"Breakdown role-plays",b:"Practise 3 scenarios where communication breaks down:\n(1) A shopkeeper speaks too fast\n(2) Someone uses a word you don't know\n(3) They misunderstand your accent\n\nUse your recovery phrases naturally in each scenario."},
    {t:"a",d:"6 min",h:"Anthem — second verse",b:"Continue building the second verse. Sing what you have so far — verse 1 plus verse 2 lines — as a continuous run."}
   ],challenge:{lv:"Level 9",h:"Intentional breakdown practice",b:"In your next Khmer conversation, let a misunderstanding happen and then resolve it using only Khmer: 'សូមនិយាយយឺត' and 'ន័យថា អ្វី?'. Don't reach for English."}}
  ]},
  {n:6,title:"Week 6 — Fluency sprint",theme:"Storytelling, opinions & free conversation",days:[
   {n:36,title:"Storytelling — past events",sections:[
    {t:"l",d:"8 min",h:"Narrative connectors",b:"These words let you tell stories, not just answer questions.",p:[["ដំបូង / បន្ទាប់មក","Dambong / Bantap mok","First / Then"],["ហើយ / ដូច្នេះ / ប៉ុន្តែ","Haoy / Douchnih / Ponttae","And then / So / But"],["ទីបំផុត","Ti bamphost","Finally / In the end"]]},
    {t:"s",d:"14 min",h:"Tell a story",b:"Tell the story of your day yesterday in Khmer. Use at least 5 narrative connectors. Aim for 2 full minutes of continuous speech. Record it. No pausing to think in English."},
    {t:"a",d:"6 min",h:"Anthem — complete run",b:"Sing both verses of Nokor Reach from start to finish. Focus on consistent tempo and smooth transitions. You are one week from your goal."}
   ],challenge:{lv:"Level 9",h:"2-minute story to a real person",b:"Tell a 2-minute story in Khmer to a language partner on HelloTalk — something that happened to you recently. Use past tense markers and narrative connectors. No English, even when stuck."}},
   {n:37,title:"Expressing strong opinions",sections:[
    {t:"l",d:"8 min",h:"Debate & discussion vocabulary",b:"Move beyond agreeing — learn to respectfully disagree and hold your position.",p:[["ខ្ញុំយល់ស្រប / មិនស្រប","Khnhom yol srop / min srop","I agree / disagree"],["តាមគំនិតរបស់ខ្ញុំ...","Tam komnit robos khnhom...","In my opinion..."],["ខ្ញុំគិតម្យ៉ាងទៀតថា...","Khnhom kit myang tiet tha...","I think differently that..."],["អ្នកមានចំណុចល្អ","Neak mean chamnoch laa","You make a good point"]]},
    {t:"s",d:"14 min",h:"Debate yourself",b:"Choose any topic. Argue one side for 60 seconds in Khmer. Then argue the OPPOSITE side for 60 seconds. Use opinion and disagreement phrases throughout."},
    {t:"r",d:"8 min",h:"6-week consolidation",b:"Final sweep of all 6 weeks. Go through each week's key phrases. Any you still struggle with — those are your final study targets before the 3-month mark."}
   ],challenge:{lv:"Level 9",h:"Opinion exchange",b:"Have a 15-minute Khmer conversation where you both give opinions on the same topic and respectfully agree or disagree. No English. Use your disagreement vocabulary actively."}},
   {n:41,title:"Final review & anthem milestone",sections:[
    {t:"r",d:"10 min",h:"Full curriculum recall",b:"Without notes, perform this in Khmer:\nIntroduce yourself → give directions → buy something and negotiate → tell a story about last week → share your opinion on a topic.\n\nAim for 5–7 minutes of continuous Khmer speech."},
    {t:"l",d:"5 min",h:"Final comprehension",b:"Watch a 5-minute native Khmer video with no subtitles. Write down every phrase you understand. Compare this list to your Week 1 attempt — the growth is real."},
    {t:"a",d:"15 min",h:"National anthem — MILESTONE",b:"Sing the full Nokor Reach — both verses — from memory, with correct melody and rhythm. Record yourself.\n\nThis is your 7-week anthem milestone.\n\n'ស្រុកខ្មែរ ដែលមានព្រះអង្គ...' — Cambodia, where the King reigns...\n\nYou have done it."}
   ],challenge:{lv:"Level 10",h:"3-month milestone",b:"Final challenge: have a 20-minute real conversation in Khmer — at a restaurant, market, or with a language partner — entirely in Khmer. When it ends, record a 1-minute voice reflection IN KHMER about how far you've come."}}
  ]}
 ]
};

let cw=0,cd=0;
const badge = {l:'bl',s:'bs',r:'br',a:'ba'};
const btext = {l:'🎧 Listening',s:'💬 Speaking',r:'🔁 Review',a:'🎵 Anthem'};

function render(){
  const wk=C.weeks[cw], dy=wk.days[cd];
  let h=`<div class="lesson-title">Day ${dy.n} — ${dy.title}</div><div class="lesson-meta">30 minutes · Week ${wk.n}</div>`;
  dy.sections.forEach(s=>{
    h+=`<div class="section"><div class="sec-head"><span class="badge ${badge[s.t]||'br'}">${btext[s.t]||s.t}</span><span class="dur">${s.d}</span></div><div class="sec-title">${s.h}</div><div class="sec-body">${s.b}</div>`;
    if(s.p){h+='<table>';s.p.forEach(r=>h+=`<tr><td class="khmer">${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`);h+='</table>';}
    if(s.tip)h+=`<div class="tip">Tip: ${s.tip}</div>`;
    h+='</div>';
  });
  const c=dy.challenge;
  h+=`<div class="challenge"><div class="ch-head"><div class="ch-title">Daily challenge — ${c.h}</div><span class="level">${c.lv}</span></div><div class="ch-body">${c.b}</div></div>`;
  document.getElementById('lesson').innerHTML=h;

  document.getElementById('wTag').textContent=wk.theme;
  document.querySelectorAll('.wbtn').forEach((b,i)=>b.className='wbtn'+(i===cw?' on':''));
  let dn='';
  wk.days.forEach((d,i)=>dn+=`<button class="dbtn${i===cd?' on':''}" onclick="sd(${i})">Day ${d.n}</button>`);
  document.getElementById('dNav').innerHTML=dn;
}

function sw(i){cw=i;cd=0;document.querySelectorAll('.wbtn').forEach((b,j)=>b.className='wbtn'+(j===i?' on':''));render();}
window.sd=function(i){cd=i;render();};

let wn='';C.weeks.forEach((w,i)=>wn+=`<button class="wbtn${i===0?' on':''}" onclick="sw(${i})">${w.title}</button>`);
document.getElementById('wNav').innerHTML=wn;
render();
</script>
